name: Deploy to EC2 (Docker)

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two deploys at once; cancel an in-flight one if a newer push lands.
concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Deploy steps run only when the SSH key secret is present, so the first
      # push (before you add EC2_SSH_KEY) still passes — it just builds the image.
      HAS_SSH_KEY: ${{ secrets.EC2_SSH_KEY != '' }}
      IMAGE: ondc-coding-interview:latest
      DEPLOY_DIR: /home/ubuntu/ondc-coding-interview-tool
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: ${{ env.IMAGE }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure SSH
        if: env.HAS_SSH_KEY == 'true'
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy compose file to EC2
        if: env.HAS_SSH_KEY == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key.pem "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "mkdir -p ${DEPLOY_DIR}"
          scp -i ~/.ssh/deploy_key.pem docker-compose.yml \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${DEPLOY_DIR}/docker-compose.yml"

      - name: Ship image & restart container
        if: env.HAS_SSH_KEY == 'true'
        run: |
          # Stream the image straight to the EC2 docker daemon (no registry needed).
          docker save "$IMAGE" | gzip | \
            ssh -i ~/.ssh/deploy_key.pem "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "gunzip | docker load"
          ssh -i ~/.ssh/deploy_key.pem "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "bash -se" <<'EOSSH'
            set -euo pipefail
            cd /home/ubuntu/ondc-coding-interview-tool
            docker compose up -d
            docker image prune -f
          EOSSH

      - name: Note (no SSH key yet)
        if: env.HAS_SSH_KEY != 'true'
        run: |
          echo "::warning::EC2_SSH_KEY secret is not set — image built successfully but skipped deploy."
          echo "Add the PEM as the EC2_SSH_KEY repo secret, then re-run this workflow."
